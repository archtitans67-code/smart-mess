<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard — Smart Mess</title>
  <link rel="stylesheet" href="style.css">
  <script src="predict.js"></script>
</head>
<body>
  <div class="page-shell">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <h1>👨‍🍳 Kitchen Dashboard</h1>
        <p>Today's meal registrations & admin alerts</p>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="refreshAll()">↻ Refresh</button>
        <button class="btn btn-secondary" onclick="goBack()">← Home</button>
      </div>
    </div>

    <!-- Admin Alerts Section -->
    <div id="alertsSection" style="margin-bottom: 20px;">
      <h3 style="font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">📩 Admin Alerts for Today</h3>
      <div id="alertsList">
        <div class="alert alert-info">No alerts from admin yet.</div>
      </div>
    </div>

    <!-- Today's Registered Students -->
    <h3 style="font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">🍽️ Students Registered Today</h3>
    <div class="stat-row" style="margin-bottom: 20px;">
      <div class="stat-card">
        <div class="stat-icon breakfast">☀️</div>
        <div class="stat-info">
          <div class="stat-label">Breakfast</div>
          <div class="stat-value" id="countBreakfast">0</div>
          <div class="stat-sub">students</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon lunch">🍛</div>
        <div class="stat-info">
          <div class="stat-label">Lunch</div>
          <div class="stat-value" id="countLunch">0</div>
          <div class="stat-sub">students</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon dinner">🌙</div>
        <div class="stat-info">
          <div class="stat-label">Dinner</div>
          <div class="stat-value" id="countDinner">0</div>
          <div class="stat-sub">students</div>
        </div>
      </div>
    </div>

    <!-- Prediction Cards -->
    <h3 style="font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">📊 Predicted Portions</h3>
    <div id="predictions" class="grid-3"></div>
  </div>

  <script>
    async function loadPredictions() {
      try {
        const response = await fetch('/pre-registrations');
        const preRegistrations = await response.json();

        const today = new Date().toISOString().split('T')[0];
        const todayRegs = preRegistrations.filter(pr => pr.date === today);

        // Update stat cards with real counts
        const breakfastCount = todayRegs.filter(pr => pr.meals.includes('breakfast')).length;
        const lunchCount = todayRegs.filter(pr => pr.meals.includes('lunch')).length;
        const dinnerCount = todayRegs.filter(pr => pr.meals.includes('dinner')).length;

        document.getElementById('countBreakfast').textContent = breakfastCount;
        document.getElementById('countLunch').textContent = lunchCount;
        document.getElementById('countDinner').textContent = dinnerCount;

        // Build prediction cards
        const wasteLog = [];
        const meals = ['breakfast', 'lunch', 'dinner'];
        const emojis = { breakfast: '☀️', lunch: '🍛', dinner: '🌙' };
        const counts = { breakfast: breakfastCount, lunch: lunchCount, dinner: dinnerCount };

        const predictionsDiv = document.getElementById('predictions');
        predictionsDiv.innerHTML = '';

        meals.forEach(meal => {
          const result = predict(meal, preRegistrations, wasteLog);
          const mealName = meal.charAt(0).toUpperCase() + meal.slice(1);
          const card = document.createElement('div');
          card.className = 'kitchen-meal-card';
          card.innerHTML = `
            <div class="meal-strip ${meal}"></div>
            <div class="meal-emoji">${emojis[meal]}</div>
            <div class="meal-name">${mealName}</div>
            <div class="meal-count">${Math.round(result.prediction)}</div>
            <div class="meal-unit">predicted portions</div>
            <ul class="breakdown-list" style="text-align: left; margin-top: 16px;">
              <li><span>Today's pre-reg (50%)</span><span>${result.breakdown.todayRegistrations}</span></li>
              <li><span>Avg 7 days (30%)</span><span>${result.breakdown.avg7days}</span></li>
              <li><span>Same weekday (20%)</span><span>${result.breakdown.sameWeekday}</span></li>
            </ul>
          `;
          predictionsDiv.appendChild(card);
        });
      } catch (error) {
        document.getElementById('predictions').innerHTML =
          `<div class="alert alert-error">Error loading predictions: ${error.message}</div>`;
      }
    }

    async function loadAlerts() {
      try {
        const response = await fetch('/sent-alerts');
        const alerts = await response.json();
        const alertsList = document.getElementById('alertsList');

        if (alerts.length === 0) {
          alertsList.innerHTML = '<div class="alert alert-info">No alerts from admin yet.</div>';
          return;
        }

        const emojis = { breakfast: '☀️', lunch: '🍛', dinner: '🌙' };
        alertsList.innerHTML = '';

        alerts.forEach(alert => {
          const mealName = alert.meal.charAt(0).toUpperCase() + alert.meal.slice(1);
          const time = new Date(alert.sentAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
          const div = document.createElement('div');
          div.className = 'alert-card';
          div.style.marginBottom = '10px';
          div.innerHTML = `
            <div class="alert-dot"></div>
            <div class="alert-text">${emojis[alert.meal] || '🍽️'} <strong>${mealName}</strong> — Prepare <strong>${alert.prediction} portions</strong></div>
            <div class="alert-time">${time}</div>
          `;
          alertsList.appendChild(div);
        });
      } catch (error) {
        console.error('Error loading alerts:', error);
      }
    }

    function refreshAll() {
      loadPredictions();
      loadAlerts();
    }

    function goBack() {
      window.location.href = '/';
    }

    window.addEventListener('load', () => {
      loadPredictions();
      loadAlerts();
    });

    // Auto-refresh every 15 seconds
    setInterval(refreshAll, 15000);
  </script>
</body>
</html>
