<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal — Smart Mess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <h1>🎓 Student Portal</h1>
        <p>Register & pre-register for your meals</p>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary" onclick="goBack()">← Home</button>
      </div>
    </div>

    <div class="grid-2">
      <!-- Registration Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon green">👤</div>
          <div>
            <div class="card-title">One-Time Registration</div>
            <div class="card-subtitle">New students register here first</div>
          </div>
        </div>
        <form id="studentRegistrationForm">
          <div class="form-group">
            <label for="studentName">Full Name</label>
            <input type="text" id="studentName" placeholder="e.g., Sourav Kumar" required>
          </div>
          <div class="form-group">
            <label for="rollno">Roll Number</label>
            <input type="text" id="rollno" placeholder="e.g., 417" required>
          </div>
          <div class="form-group">
            <label for="section">Section</label>
            <input type="text" id="section" placeholder="e.g., B2" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Register Student</button>
        </form>
        <div id="studentMessage"></div>
      </div>

      <!-- Pre-Registration Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon orange">🍽️</div>
          <div>
            <div class="card-title">Pre-Register for Today</div>
            <div class="card-subtitle">Select meals you'll attend today</div>
          </div>
        </div>
        <form id="preRegistrationForm">
          <div class="form-group">
            <label for="preRollno">Roll Number</label>
            <input type="text" id="preRollno" placeholder="Enter your roll number" required>
          </div>

          <label>Select your meals</label>
          <div class="checkbox-group" style="margin-bottom: 16px;">
            <div class="checkbox-pill">
              <input type="checkbox" id="preBreakfast" name="preMeals" value="breakfast">
              <label for="preBreakfast"><span class="pill-dot"></span> ☀️ Breakfast</label>
            </div>
            <div class="checkbox-pill">
              <input type="checkbox" id="preLunch" name="preMeals" value="lunch">
              <label for="preLunch"><span class="pill-dot"></span> 🍛 Lunch</label>
            </div>
            <div class="checkbox-pill">
              <input type="checkbox" id="preDinner" name="preMeals" value="dinner">
              <label for="preDinner"><span class="pill-dot"></span> 🌙 Dinner</label>
            </div>
          </div>

          <button type="submit" class="btn btn-success btn-full">Pre-Register</button>
        </form>
        <div id="preMessage"></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('studentRegistrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('studentName').value;
      const rollno = document.getElementById('rollno').value;
      const section = document.getElementById('section').value;

      try {
        const response = await fetch('/register-student', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, rollno, section })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('studentMessage', `✅ Student ${name} registered successfully!`, 'success');
          document.getElementById('studentRegistrationForm').reset();
        } else {
          showMessage('studentMessage', `❌ ${data.error}`, 'error');
        }
      } catch (error) {
        showMessage('studentMessage', `❌ Error: ${error.message}`, 'error');
      }
    });

    document.getElementById('preRegistrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const rollno = document.getElementById('preRollno').value;
      const checkboxes = document.querySelectorAll('input[name="preMeals"]:checked');
      const meals = Array.from(checkboxes).map(cb => cb.value);

      if (meals.length === 0) {
        showMessage('preMessage', 'Please select at least one meal', 'error');
        return;
      }

      try {
        const response = await fetch('/pre-register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rollno, meals })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('preMessage', `✅ Pre-registered for ${meals.join(', ')}!`, 'success');
          document.getElementById('preRegistrationForm').reset();
        } else {
          showMessage('preMessage', `❌ ${data.error}`, 'error');
        }
      } catch (error) {
        showMessage('preMessage', `❌ Error: ${error.message}`, 'error');
      }
    });

    function showMessage(elementId, text, type) {
      const messageDiv = document.getElementById(elementId);
      messageDiv.className = `alert alert-${type}`;
      messageDiv.textContent = text;
    }

    function goBack() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
