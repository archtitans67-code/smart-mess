<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="predict.js"></script>
</head>
<body>
  <div class="container dashboard-container">
    <div class="page-header">
      <h1>📊 Admin Dashboard</h1>
      <p class="subtitle">Meal predictions & waste tracking</p>
    </div>

    <section class="section">
      <h2>📈 Analytics</h2>
      <div class="charts-grid">
        <div class="card">
          <canvas id="predictionChart"></canvas>
        </div>
        <div class="card">
          <canvas id="wasteChart"></canvas>
        </div>
      </div>
    </section>

    <div id="accuracy" class="alert alert-info"></div>

    <section class="section">
      <h2>📱 Send SMS Alert to Kitchen</h2>
      <form id="smsForm">
        <div class="form-group">
          <label for="smsMeal">Select Meal:</label>
          <select id="smsMeal" required onchange="fillPrediction()">
            <option value="">-- Choose Meal --</option>
            <option value="breakfast">🌅 Breakfast</option>
            <option value="lunch">🍽️ Lunch</option>
            <option value="dinner">🌙 Dinner</option>
          </select>
        </div>

        <div class="form-group">
          <label for="smsPrediction">Predicted Portions:</label>
          <input type="number" id="smsPrediction" placeholder="e.g., 45" required>
        </div>

        <button type="submit" class="btn btn-success">📤 Send SMS Alert</button>
      </form>

      <div id="smsMessage"></div>
    </section>

    <section class="section">
      <h2>📝 Log Actual Cooked Quantity</h2>
      <form id="wasteForm">
        <div class="form-group">
          <label for="wasteMeal">Select Meal:</label>
          <select id="wasteMeal" required>
            <option value="">-- Choose Meal --</option>
            <option value="breakfast">🌅 Breakfast</option>
            <option value="lunch">🍽️ Lunch</option>
            <option value="dinner">🌙 Dinner</option>
          </select>
        </div>

        <div class="form-group">
          <label for="predicted">Predicted Portions:</label>
          <input type="number" id="predicted" placeholder="e.g., 42" required>
        </div>

        <div class="form-group">
          <label for="actual">Actual Cooked Portions:</label>
          <input type="number" id="actual" placeholder="e.g., 45" required>
        </div>

        <button type="submit" class="btn btn-primary">✅ Log Waste</button>
      </form>

      <div id="wasteMessage"></div>
      <button class="btn btn-secondary" onclick="goBack()">← Back</button>
    </section>
  </div>

  <script>
    let allPreRegistrations = [];
    let allWasteLogs = [];
    let predictionChart = null;
    let wasteChart = null;
    let currentPredictions = {}; // Store current predictions for SMS

    async function loadDashboard() {
      try {
        // Fetch pre-registrations and waste logs
        const [preRegResponse, wasteResponse] = await Promise.all([
          fetch('/pre-registrations'),
          fetch('/waste-log')
        ]);

        allPreRegistrations = await preRegResponse.json();
        allWasteLogs = await wasteResponse.json();

        // Draw charts and predictions
        drawPredictionChart();
        drawWasteChart();
        calculateAccuracy();

      } catch (error) {
        console.error('Error loading dashboard:', error);
      }
    }

    function drawPredictionChart() {
      const meals = ['breakfast', 'lunch', 'dinner'];
      const today = new Date().toISOString().split('T')[0];

      const predictions = meals.map(meal => {
        const result = predict(meal, allPreRegistrations, allWasteLogs);
        currentPredictions[meal] = Math.round(result.prediction); // Store for SMS
        return Math.round(result.prediction);
      });

      const ctx = document.getElementById('predictionChart').getContext('2d');

      if (predictionChart) predictionChart.destroy();

      predictionChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Breakfast', 'Lunch', 'Dinner'],
          datasets: [{
            label: 'Predicted Portions',
            data: predictions,
            backgroundColor: [
              'rgba(102, 126, 234, 0.8)',
              'rgba(244, 93, 173, 0.8)',
              'rgba(74, 198, 253, 0.8)'
            ],
            borderColor: [
              'rgba(102, 126, 234, 1)',
              'rgba(244, 93, 173, 1)',
              'rgba(74, 198, 253, 1)'
            ],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: `Today's Predictions (${today})`
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }

    function drawWasteChart() {
      // Get last 7 days of waste data
      const last7Days = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        last7Days.push(date.toISOString().split('T')[0]);
      }

      const wasteDelta = last7Days.map(date => {
        const dayWaste = allWasteLogs.filter(w => w.date === date);
        if (dayWaste.length === 0) return 0;

        const avgDelta = dayWaste.reduce((sum, w) => sum + ((w.actual - w.predicted) / w.predicted * 100), 0) / dayWaste.length;
        return Math.round(avgDelta);
      });

      const ctx = document.getElementById('wasteChart').getContext('2d');

      if (wasteChart) wasteChart.destroy();

      wasteChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: last7Days.map(d => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })),
          datasets: [{
            label: 'Waste Delta (%)',
            data: wasteDelta,
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            borderColor: 'rgba(255, 99, 132, 1)',
            borderWidth: 2,
            fill: false
          }]
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: 'Waste Trends (Last 7 Days)'
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }

    function calculateAccuracy() {
      if (allWasteLogs.length === 0) {
        document.getElementById('accuracy').innerHTML = '<div class="alert alert-info">No waste data available yet</div>';
        return;
      }

      const totalWaste = allWasteLogs.reduce((sum, w) => sum + Math.abs(w.actual - w.predicted), 0);
      const avgWaste = totalWaste / allWasteLogs.length;
      const accuracy = Math.max(0, 100 - (avgWaste / allWasteLogs.reduce((sum, w) => sum + w.predicted, 0) / allWasteLogs.length * 100));

      document.getElementById('accuracy').innerHTML = `<div class="alert alert-info">Prediction Accuracy: ${Math.round(accuracy)}%</div>`;
    }

    // SMS Form Handler
    document.getElementById('smsForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const meal = document.getElementById('smsMeal').value;
      const prediction = document.getElementById('smsPrediction').value;

      try {
        const response = await fetch('/send-sms', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ meal, prediction: parseInt(prediction) })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('smsMessage', `✅ ${data.message}`, 'success');
          document.getElementById('smsForm').reset();
        } else {
          showMessage('smsMessage', `❌ ${data.error}`, 'error');
        }
      } catch (error) {
        showMessage('smsMessage', `❌ Error: ${error.message}`, 'error');
      }
    });

    function fillPrediction() {
      const meal = document.getElementById('smsMeal').value;
      if (!meal) return;

      // Find the prediction for this meal from currentPredictions
      const result = predict(meal, allPreRegistrations, allWasteLogs);
      document.getElementById('smsPrediction').value = Math.round(result.prediction);
    }

    function showMessage(elementId, text, type) {
      const messageDiv = document.getElementById(elementId);
      messageDiv.className = `alert alert-${type}`;
      messageDiv.textContent = text;
    }

    // Waste Form Handler
    document.getElementById('wasteForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const meal = document.getElementById('wasteMeal').value;
      const predicted = document.getElementById('predicted').value;
      const actual = document.getElementById('actual').value;

      try {
        const response = await fetch('/log-waste', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            meal, 
            predicted: parseInt(predicted), 
            actual: parseInt(actual) 
          })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('wasteMessage', `✅ ${data.message} (Predicted: ${data.predicted}, Actual: ${data.actual}, Delta: ${data.delta})`, 'success');
          document.getElementById('wasteForm').reset();
          // Reload dashboard to update charts
          loadDashboard();
        } else {
          showMessage('wasteMessage', `❌ ${data.error}`, 'error');
        }
      } catch (error) {
        showMessage('wasteMessage', `❌ Error: ${error.message}`, 'error');
      }
    });

    // Load dashboard on page load
    window.addEventListener('load', loadDashboard);

    function goBack() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
